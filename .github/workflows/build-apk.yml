name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install dependencies
      run: npm ci

    - name: Add Android platform
      run: npx cordova platform add android

    - name: Build debug APK
      run: npx cordova build android --debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: app-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Get APK info
      run: |
        echo "APK built successfully!"
        ls -lh platforms/android/app/build/outputs/apk/debug/
        echo "APK size: $(du -h platforms/android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
