<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://ssl.gstatic.com https://api.openweathermap.org 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content: https:;">
    <title>喝水打卡</title>
    <link rel="stylesheet" type="text/css" href="css/index.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>💧 喝水打卡</h1>

            <!-- 日历和天气信息区域 -->
            <div class="info-widgets">
                <div class="calendar-widget">
                    <div class="calendar-icon">📅</div>
                    <div class="calendar-info">
                        <div class="calendar-date" id="calendarDate">2024年1月1日</div>
                        <div class="calendar-weekday" id="calendarWeekday">星期一</div>
                    </div>
                </div>

                <div class="weather-widget" id="weatherWidget">
                    <div class="weather-icon" id="weatherIcon">🌤️</div>
                    <div class="weather-info">
                        <div class="weather-temp" id="weatherTemp">--°C</div>
                        <div class="weather-desc" id="weatherDesc">加载中...</div>
                    </div>
                </div>
            </div>

            <div class="today-stats">
                <p>今日已喝水</p>
                <p class="count" id="todayCount">0</p>
                <p>次</p>
            </div>

            <!-- 今日总量显示 -->
            <div class="today-total">
                <span class="total-label">今日总量：</span>
                <span class="total-amount" id="todayTotal">0</span>
                <span class="total-unit">ml</span>
            </div>

            <!-- 目标进度区域 -->
            <div class="goal-section">
                <div class="goal-header">
                    <span class="goal-label">每日目标</span>
                    <span class="goal-value">
                        <span id="goalCurrent">0</span> / <span id="goalTarget">8</span> 次
                    </span>
                    <button id="goalSettingBtn" class="goal-setting-btn" title="设置目标">⚙️</button>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="progress-text" id="progressText">0%</div>
                    </div>
                </div>
            </div>

            <div class="motivational-text" id="motivationalText">保持健康，多喝水！</div>
        </div>

        <!-- 目标设置弹窗 -->
        <div class="modal" id="goalModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>🎯 设置每日目标</h3>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <div class="modal-body">
                    <p class="modal-description">设置您每天想要喝水的次数目标</p>
                    <div class="goal-input-group">
                        <label for="goalInput">目标次数：</label>
                        <input type="number" id="goalInput" min="1" max="20" value="8" />
                        <span class="input-unit">次/天</span>
                    </div>
                    <div class="goal-presets">
                        <p class="presets-label">快速选择：</p>
                        <button class="preset-btn" data-value="6">6次</button>
                        <button class="preset-btn" data-value="8">8次</button>
                        <button class="preset-btn" data-value="10">10次</button>
                        <button class="preset-btn" data-value="12">12次</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" id="btnCancel">取消</button>
                    <button class="btn-confirm" id="btnConfirm">确定</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <button id="checkInBtn" class="check-in-btn">
                <span class="btn-icon">💧</span>
                <span class="btn-text">打卡喝水</span>
            </button>
            <div class="check-in-hint">点击按钮记录喝水时刻</div>
        </div>

        <div class="records-section">
            <h2>📋 喝水记录</h2>
            <div id="recordsList" class="records-list">
                <p class="empty-message">✨ 暂无记录<br>点击上方按钮开始打卡吧！</p>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="js/index.js"></script>
</body>
</html>
